<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videomin Interlacing</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0e0e0;
            --accent: #007acc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }
        .controls {
            background: var(--panel);
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        input[type="range"], input[type="file"] { width: 100%; }
        .preview-container {
            background: var(--panel);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        canvas {
            max-width: 100%;
            background: #000;
            border: 1px solid #333;
        }
        button {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
        }
        button:hover { background: #005f9e; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status { margin-top: 10px; font-size: 0.85em; color: #aaa; text-align: center; }
        footer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Videomin Interlacer</h1>
    <p style="color: #888; margin-bottom: 30px;">Apply PAL Field Shift & Drop Effects</p>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label for="videoUpload">Upload Video (with Audio)</label>
                <input type="file" id="videoUpload" accept="video/*">
            </div>
            <div class="control-group">
                <label for="volumeSlider">Volume: <span id="volVal">100%</span></label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
            </div>
            <div class="control-group">
                <label for="interlaceSize">Interlacing Size (px): <span id="sizeVal">2</span></label>
                <input type="range" id="interlaceSize" min="1" max="20" step="1" value="2">
            </div>
            <div class="control-group">
                <label for="palShift">PAL Field Shift (X-Offset): <span id="shiftVal">0</span></label>
                <input type="range" id="palShift" min="0" max="50" step="1" value="0">
            </div>
            <div class="control-group">
                <label for="dropFields">Drop Alternate Fields (Blank)</label>
                <input type="checkbox" id="dropFields">
            </div>
            <button id="playBtn" disabled>Play / Pause Preview</button>
            <button id="downloadBtn" disabled>Process & Download Video</button>
            <div id="statusText" class="status">Waiting for video...</div>
        </div>

        <div class="preview-container">
            <canvas id="outCanvas" width="640" height="360"></canvas>
            <video id="sourceVideo" style="display: none;" crossorigin="anonymous"></video>
        </div>
    </div>

    <footer>&copy; 2026 copyright videomin</footer>

    <script>
        const videoInput = document.getElementById('videoUpload');
        const sourceVideo = document.getElementById('sourceVideo');
        const outCanvas = document.getElementById('outCanvas');
        const ctx = outCanvas.getContext('2d', { willReadFrequently: true });
        
        // Controls
        const volSlider = document.getElementById('volumeSlider');
        const sizeSlider = document.getElementById('interlaceSize');
        const shiftSlider = document.getElementById('palShift');
        const dropCheckbox = document.getElementById('dropFields');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');

        // Display Spans
        const volVal = document.getElementById('volVal');
        const sizeVal = document.getElementById('sizeVal');
        const shiftVal = document.getElementById('shiftVal');

        // Buffers for temporal PAL effects
        const prevFrameCanvas = document.createElement('canvas');
        const prevCtx = prevFrameCanvas.getContext('2d');
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        let animationId;
        let isProcessing = false;
        let mediaRecorder;
        let recordedChunks = [];

        // Update Labels
        volSlider.addEventListener('input', (e) => {
            sourceVideo.volume = e.target.value;
            volVal.textContent = Math.round(e.target.value * 100) + '%';
        });
        sizeSlider.addEventListener('input', (e) => sizeVal.textContent = e.target.value);
        shiftSlider.addEventListener('input', (e) => shiftVal.textContent = e.target.value);

        // Handle File Upload
        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            sourceVideo.src = url;
            
            sourceVideo.onloadedmetadata = () => {
                outCanvas.width = sourceVideo.videoWidth;
                outCanvas.height = sourceVideo.videoHeight;
                prevFrameCanvas.width = sourceVideo.videoWidth;
                prevFrameCanvas.height = sourceVideo.videoHeight;
                tempCanvas.width = sourceVideo.videoWidth;
                tempCanvas.height = sourceVideo.videoHeight;
                
                playBtn.disabled = false;
                downloadBtn.disabled = false;
                statusText.textContent = "Ready.";
                renderFrame(); // Render first frame
            };
        });

        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (sourceVideo.paused) {
                sourceVideo.play();
                processVideo();
                playBtn.textContent = "Pause Preview";
            } else {
                sourceVideo.pause();
                cancelAnimationFrame(animationId);
                playBtn.textContent = "Play Preview";
            }
        });

        // Main rendering loop
        function processVideo() {
            if (sourceVideo.paused || sourceVideo.ended) return;
            renderFrame();
            animationId = requestAnimationFrame(processVideo);
        }

        function renderFrame() {
            const width = outCanvas.width;
            const height = outCanvas.height;
            const size = parseInt(sizeSlider.value);
            const shift = parseInt(shiftSlider.value);
            const drop = dropCheckbox.checked;

            // Draw current frame to temp buffer
            tempCtx.drawImage(sourceVideo, 0, 0, width, height);

            // Clear output
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, width, height);

            // Interlacing and PAL effect logic
            for (let y = 0; y < height; y += size * 2) {
                // FIELD A (Current Frame, shifted X)
                ctx.drawImage(tempCanvas, 0, y, width, size, shift, y, width, size);

                // FIELD B (Previous Frame temporally, or dropped)
                if (y + size < height) {
                    if (!drop) {
                        ctx.drawImage(prevFrameCanvas, 0, y + size, width, size, 0, y + size, width, size);
                    }
                }
            }

            // Save current frame as previous frame for the next loop (Temporal shift)
            prevCtx.drawImage(tempCanvas, 0, 0, width, height);
        }

        // Automatic Process and Download Logic
        downloadBtn.addEventListener('click', () => {
            if (isProcessing) return;
            isProcessing = true;
            recordedChunks = [];
            
            // Reset video to start
            sourceVideo.currentTime = 0;
            
            // Setup capture streams
            const canvasStream = outCanvas.captureStream(30); // 30 FPS
            
            // Attempt to get audio track from original video
            let audioStream;
            if (sourceVideo.captureStream) {
                audioStream = sourceVideo.captureStream();
            } else if (sourceVideo.mozCaptureStream) {
                audioStream = sourceVideo.mozCaptureStream();
            }

            if (audioStream && audioStream.getAudioTracks().length > 0) {
                canvasStream.addTrack(audioStream.getAudioTracks()[0]);
            }

            try {
                mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm; codecs=vp9' });
            } catch (e) {
                mediaRecorder = new MediaRecorder(canvasStream); // Fallback to browser default
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'videomin_processed.webm';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                
                isProcessing = false;
                downloadBtn.textContent = "Process & Download Video";
                statusText.textContent = "Download complete!";
                playBtn.disabled = false;
            };

            // Start recording and playback
            playBtn.disabled = true;
            downloadBtn.textContent = "Processing... (Please wait)";
            statusText.textContent = "Processing video inline. Do not switch tabs.";
            
            mediaRecorder.start();
            sourceVideo.play();
            processVideo();

            // Stop recording when video ends
            sourceVideo.onended = () => {
                mediaRecorder.stop();
                cancelAnimationFrame(animationId);
                sourceVideo.onended = null; // Reset listener
            };
        });
    </script>
</body>
</html>
